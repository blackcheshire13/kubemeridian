# KubeMeridian datasource, provisioned via the Grafana datasources sidecar
# (kiwigrid k8s-sidecar watches Secrets/ConfigMaps labelled grafana_datasource=1).
#
# The access_token placeholder is filled at apply time from the read-only SA token
# Secret (deploy/rbac.yaml) — the real token is NOT committed:
#
#   TOKEN=$(kubectl -n monitoring get secret kubemeridian-readonly-token \
#             -o jsonpath='{.data.token}' | base64 -d)
#   sed "s|__SA_TOKEN__|$TOKEN|" deploy/grafana-datasource.yaml | \
#     kubectl --context <your-kube-context> apply -f -
#
# Apply AFTER the plugin is installed (the datasource type must exist first).
apiVersion: v1
kind: Secret
metadata:
  name: kubemeridian-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
stringData:
  kubemeridian-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: KubeMeridian — internal
        type: devopstech-kubemeridian-datasource
        access: proxy
        isDefault: false
        jsonData:
          cluster_url: https://kubernetes.default.svc
          access_via_token: true
          tlsSkipVerify: true
          # Connections by datasource UID. metrics uid "prometheus" is the kps
          # default; set logs_uid/traces_uid to your Loki/Tempo datasource UIDs
          # (find them in Grafana under Connections → Data sources), or omit them.
          metrics_uid: prometheus
          logs_uid: <your-loki-datasource-uid>
          traces_uid: <your-tempo-datasource-uid>
          # RED source: set to the ingress/mesh stack your cluster runs (istio,
          # linkerd, nginx, traefik, …) — see the Services (RED) page / docs.
          traffic:
            profile: istio
          refresh_pods_rate: "60"
        secureJsonData:
          access_token: __SA_TOKEN__
        editable: false
