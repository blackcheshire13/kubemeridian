# Minimal additive overlay for the existing kube-prometheus-stack release `kps`
# in the `monitoring` namespace, applied with:
#
#   helm upgrade kps prometheus-community/kube-prometheus-stack \
#     --version 86.2.3 -n monitoring --reuse-values -f deploy/kps-grafana-overlay.yaml
#
# Only grafana.* keys are touched (no alertmanager/prometheus values), so existing
# datasources/OAuth/alerting are preserved.
#
# - GF_INSTALL_PLUGINS uses Grafana's classic installer (url;folder) which reliably
#   installs an unsigned plugin from a zip URL — the chart's `plugins:` list did not.
# - deploymentStrategy Recreate avoids the RWO PVC Multi-Attach deadlock that blocks
#   a RollingUpdate of the persistence-backed Grafana.
# - allow_loading_unsigned_plugins permits the app; the bundled datasource inherits it.
# The KubeMeridian datasource is provisioned out-of-band via the sidecar
# (deploy/grafana-datasource.yaml), so it is not listed here.

grafana:
  deploymentStrategy:
    type: Recreate
  plugins: []
  env:
    # Point this at wherever you host the packaged zip (object storage or the
    # GitHub Release asset), e.g. https://<your-host>/devopstech-kubemeridian-app-<version>.zip
    GF_INSTALL_PLUGINS: "https://<your-host>/devopstech-kubemeridian-app.zip;devopstech-kubemeridian-app"
  grafana.ini:
    plugins:
      # Both ids must be listed: in Grafana 13 the bundled datasource does NOT
      # inherit the parent app's unsigned permission.
      allow_loading_unsigned_plugins: devopstech-kubemeridian-app,devopstech-kubemeridian-datasource

# Expose node instance-type / region / zone labels on kube-state-metrics so the
# Cost Explorer can price nodes from the bundled per-instance-type catalog
# (Tier 1) instead of the per-cloud flat estimate (Tier 2). KSM drops node labels
# by default since v2.0.
kube-state-metrics:
  metricLabelsAllowlist:
    - "nodes=[node.kubernetes.io/instance-type,topology.kubernetes.io/region,topology.kubernetes.io/zone]"
