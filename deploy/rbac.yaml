# Read-only ServiceAccount for the KubeMeridian datasource.
#
# The bundled datasource proxies GET requests to the Kubernetes API. When Grafana
# runs in-cluster (e.g. kube-prometheus-stack in the `monitoring` namespace) it can
# reach https://kubernetes.default.svc and authenticate with this SA's bearer token.
#
# Apply:  kubectl apply -f deploy/rbac.yaml
# Token:  kubectl -n monitoring get secret kubemeridian-readonly-token -o jsonpath='{.data.token}' | base64 -d
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubemeridian-readonly
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubemeridian-readonly
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - namespaces
      - services
      - componentstatuses
      - events
      - persistentvolumeclaims
      - persistentvolumes
      - resourcequotas
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubemeridian-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubemeridian-readonly
subjects:
  - kind: ServiceAccount
    name: kubemeridian-readonly
    namespace: monitoring
---
# Long-lived token (Kubernetes 1.24+ no longer auto-creates SA token Secrets).
apiVersion: v1
kind: Secret
metadata:
  name: kubemeridian-readonly-token
  namespace: monitoring
  annotations:
    kubernetes.io/service-account.name: kubemeridian-readonly
type: kubernetes.io/service-account-token
