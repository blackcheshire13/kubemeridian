# kube-prometheus-stack Helm values snippet to install the (unsigned) KubeGraf
# plugin into the bundled Grafana and provision a datasource for the in-cluster
# Kubernetes API.
#
# Merge the `grafana:` keys below into your existing kube-prometheus-stack values
# (cluster: do-fra1-starcrown-internal, release: kps, namespace: monitoring).
#
# Prereqs:
#   1. kubectl apply -f deploy/rbac.yaml         (creates SA + token in `monitoring`)
#   2. Host the built plugin zip at a URL Grafana can reach (GitHub release asset
#      or a DO Spaces object). Build it with: npm ci && npm run build && \
#      mv dist starcrown-kubegraf-app && zip -r starcrown-kubegraf-app.zip starcrown-kubegraf-app
#
# plugin.json changes require a Grafana restart — rolling the deployment is enough.

grafana:
  # Install the unsigned plugin from a zip URL (<url>;<unzip-folder-name>).
  plugins:
    - "https://github.com/blackcheshire13/kubegraf/releases/download/vX.Y.Z/starcrown-kubegraf-app.zip;starcrown-kubegraf-app"

  grafana.ini:
    plugins:
      # The bundled datasource inherits the app's unsigned permission.
      allow_loading_unsigned_plugins: starcrown-kubegraf-app

  # Mount the read-only SA token so the datasource provisioning can reference it
  # via $__file{} instead of embedding the secret in values.
  extraSecretMounts:
    - name: kubegraf-sa-token
      secretName: kubegraf-readonly-token
      mountPath: /etc/secrets/kubegraf
      readOnly: true

  # Provision the "cluster" datasource pointing at the in-cluster API server.
  additionalDataSources:
    - name: KubeGraf — internal
      type: starcrown-kubegraf-datasource
      access: proxy
      isDefault: false
      jsonData:
        cluster_url: https://kubernetes.default.svc
        access_via_token: true
        tlsSkipVerify: true
        prometheus_name: Prometheus
        refresh_pods_rate: "60"
      secureJsonData:
        access_token: $__file{/etc/secrets/kubegraf/token}
      editable: false
