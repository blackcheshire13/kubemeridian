version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: 'monthly'
    # Wait 5 days before updating to help circumvent supply chain attacks
    cooldown:
      default-days: 5
      # Exclude plugin-e2e to prevent false positives with canary e2e tests
      exclude:
        - '@grafana/plugin-e2e'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore'
      include: 'scope'
    # Collapse every npm update into at most two PRs (production + development)
    # so dependency bumps don't sprawl into one PR per package.
    groups:
      npm-production:
        dependency-type: 'production'
      npm-development:
        dependency-type: 'development'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'chore(ci)'
    open-pull-requests-limit: 3
    # Single grouped PR for all GitHub Actions bumps.
    groups:
      github-actions:
        patterns:
          - '*'
